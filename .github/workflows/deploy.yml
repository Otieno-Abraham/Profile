name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly rebuild every Monday 06:00 UTC (09:00 EAT) — publishes any blog
    # post whose date has arrived (scheduled/queued posts).
    - cron: "0 6 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Notify search engines (IndexNow — Bing, Yandex, etc.)
        run: |
          KEY="4616adff863c432fdd49583936514672"
          URLS=$(grep -oE '<loc>[^<]+</loc>' _site/sitemap.xml | sed -E 's#</?loc>##g' | jq -R . | jq -s -c .)
          echo "Submitting $(echo "$URLS" | jq 'length') URLs to IndexNow"
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"abrahamotieno.com\",\"key\":\"$KEY\",\"keyLocation\":\"https://abrahamotieno.com/$KEY.txt\",\"urlList\":$URLS}" \
            -w "IndexNow HTTP %{http_code}\n" || true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
